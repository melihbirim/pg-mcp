<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#336791" stroke="#2c5282" stroke-width="2"/>
  
  <!-- PostgreSQL elephant silhouette inspired design -->
  <g transform="translate(64, 64)">
    <!-- Database cylinder layers -->
    <ellipse cx="0" cy="-15" rx="35" ry="12" fill="#4a90e2" opacity="0.9"/>
    <rect x="-35" y="-15" width="70" height="20" fill="#4a90e2" opacity="0.8"/>
    <ellipse cx="0" cy="5" rx="35" ry="12" fill="#5ba0f2" opacity="0.9"/>
    
    <!-- Second database layer -->
    <ellipse cx="0" cy="5" rx="30" ry="10" fill="#6bb6ff" opacity="0.8"/>
    <rect x="-30" y="5" width="60" height="15" fill="#6bb6ff" opacity="0.7"/>
    <ellipse cx="0" cy="20" rx="30" ry="10" fill="#7bc6ff" opacity="0.8"/>
    
    <!-- Connection lines/waves representing MCP -->
    <path d="M -45 -5 Q -25 -10 -5 -5 Q 15 0 35 -5" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M -45 10 Q -25 5 -5 10 Q 15 15 35 10" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M -45 25 Q -25 20 -5 25 Q 15 30 35 25" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.5"/>
    
    <!-- Small accent dots -->
    <circle cx="-20" cy="-8" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="0" cy="-12" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="20" cy="-8" r="2" fill="#ffffff" opacity="0.8"/>
  </g>
  
  <!-- PostgreSQL-inspired accent -->
  <path d="M 45 45 Q 55 40 65 45 Q 75 50 85 45" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.6"/>
  
  <!-- Small "P" for PostgreSQL in bottom right -->
  <text x="85" y="100" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" opacity="0.7">P</text>
</svg>
